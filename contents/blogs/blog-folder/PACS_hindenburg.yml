title: "兴登堡做空报告 | PACS集团：如何通过系统性地欺骗纳税人，在专业护理行业成为亿万富翁"
page-top-title: "博客"
author: "黄大炮"
description: "对知名做空机构Hindenburg Research针对PACS Group的沽空报告进行了系统性中文翻译与整理，内容涵盖医疗保险机制、疫情豁免政策滥用、财务异常与公司治理等多个层面，展现了做空报告在财务调查与商业模式分析中的研究逻辑。"
