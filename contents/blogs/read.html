    <!-- 可选：MathJax（注意：避免同时加载多个版本） -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',

                tagIndent: '0.8em',

            }
        };
    </script>
    <!-- 仅加载一个 MathJax 脚本 -->

            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- 章节导航系统样式 -->
    <style>
        /* 章节导航容器 - 桌面版 */
        #toc-container {
            position: fixed;
            left: 20px;
            top: 96px;
            width: 300px;
            max-height: calc(100vh - 128px);
            overflow-y: auto;
            background: rgba(18, 22, 28, 0.86);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            color: #fff;
            z-index: 1000;
            transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
            display: block;
            overscroll-behavior: contain;
        }

        #toc-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateX(-8px);
        }

        #toc-container.toc-empty,
        #toc-toggle-btn.toc-empty {
            display: none !important;
        }

        /* 章节导航标题 */
        #toc-container h3 {
            margin-top: 0;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 0 30px 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
        }

        #toc-container h3 i {
            margin-right: 8px;
        }

        /* 章节列表样式 */
        #toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #toc-list li {
            margin-bottom: 2px;
            padding-left: calc(12px + var(--toc-depth, 0) * 14px);
            position: relative;
            transition: all 0.2s ease;
        }

        #toc-list li:before {
            content: "";
            position: absolute;
            left: calc(var(--toc-depth, 0) * 14px);
            top: 13px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.42);
        }

        /* 不同级别标题的缩进 */
        #toc-list li.toc-h1 { --toc-depth: 0; }
        #toc-list li.toc-h2 { --toc-depth: 1; }
        #toc-list li.toc-h3 { --toc-depth: 2; }
        #toc-list li.toc-h4 { --toc-depth: 3; }
        #toc-list li.toc-h5 { --toc-depth: 4; }
        #toc-list li.toc-h6 { --toc-depth: 5; }

        /* 链接样式 */
        #toc-list a {
            color: rgba(255, 255, 255, 0.78);
            text-decoration: none;
            font-size: 13px;
            line-height: 1.35;
            display: block;
            padding: 5px 8px;
            border-radius: 6px;
            transition: color 0.2s ease, background-color 0.2s ease;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        #toc-list a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* 当前活动章节 */
        #toc-list li.active:before {
            background: #ff914d;
            box-shadow: 0 0 5px #ff914d;
        }

        #toc-list li.active a {
            color: #ff914d;
            font-weight: 600;
            background: rgba(255, 145, 77, 0.12);
        }

        /* 移动端悬浮按钮 */
        #toc-toggle-btn {
            position: fixed;
            left: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5); /* 调高黑色度，从0.3改为0.5 */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 1001;
            transition: transform 0.2s ease, background-color 0.2s ease;
            display: none;
        }

        #toc-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: scale(1.05);
        }

        #toc-container.mobile {
            left: 20px;
            bottom: 80px;
            top: auto;
            width: calc(100% - 40px);
            max-width: 320px;
            max-height: 60vh;
            transform: translateY(150%);
            opacity: 0;
            visibility: hidden;
            display: block !important; /* 确保元素始终存在 */
            transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s ease;
        }

        #toc-container.mobile.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        #article-md h1,
        #article-md h2,
        #article-md h3,
        #article-md h4,
        #article-md h5,
        #article-md h6 {
            scroll-margin-top: 96px;
        }

        #article-md mjx-container {
            max-width: 100%;
        }

        #article-md .math-scroll-wrap {
            display: block;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 4px 0 8px;
            margin: 0.5rem 0;
            -webkit-overflow-scrolling: touch;
        }

        #article-md .math-inline-scroll {
            display: inline-block;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            vertical-align: middle;
            -webkit-overflow-scrolling: touch;
        }

        #article-md .math-scroll-wrap mjx-container {
            display: inline-block !important;
            min-width: max-content;
            max-width: none;
            margin: 0 !important;
            padding: 0 !important;
        }

        #article-md .math-inline-scroll mjx-container {
            display: inline-block !important;
            min-width: max-content;
            max-width: none;
        }

        #article-md .math-scroll-wrap mjx-container > svg {
            max-width: none !important;
        }

        #article-md .math-inline-scroll mjx-container > svg {
            max-width: none !important;
        }

        #article-md .math-scroll-wrap::-webkit-scrollbar,
        #article-md .math-inline-scroll::-webkit-scrollbar {
            height: 6px;
        }

        #article-md .math-scroll-wrap::-webkit-scrollbar-track,
        #article-md .math-inline-scroll::-webkit-scrollbar-track {
            background: var(--site-section-muted-bg);
            border-radius: 999px;
        }

        #article-md .math-scroll-wrap::-webkit-scrollbar-thumb,
        #article-md .math-inline-scroll::-webkit-scrollbar-thumb {
            background: var(--site-card-border);
            border-radius: 999px;
        }

        #article-md mjx-container[jax="SVG"][display="true"] {
            display: block;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 4px 0 8px;
            -webkit-overflow-scrolling: touch;
        }

        #article-md mjx-container[jax="SVG"][display="true"] > svg {
            max-width: none;
        }

        #article-md mjx-container[jax="SVG"]:not([display="true"]) {
            display: inline-block;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            vertical-align: middle;
            -webkit-overflow-scrolling: touch;
        }

        #article-md mjx-container[jax="SVG"]::-webkit-scrollbar {
            height: 6px;
        }

        #article-md mjx-container[jax="SVG"]::-webkit-scrollbar-track {
            background: var(--site-section-muted-bg);
            border-radius: 999px;
        }

        #article-md mjx-container[jax="SVG"]::-webkit-scrollbar-thumb {
            background: var(--site-card-border);
            border-radius: 999px;
        }

        .article-file-card {
            display: flex;
            gap: 14px;
            align-items: stretch;
            margin: 18px 0;
            padding: 16px;
            border: 1px solid var(--site-card-border);
            border-radius: 8px;
            background: var(--site-card-bg);
            background: color-mix(in srgb, var(--site-card-bg) 92%, transparent);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            color: var(--site-text-color);
            transition: background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
        }

        .article-file-icon {
            flex: 0 0 48px;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: #455a64;
            font-size: 24px;
        }

        .article-file-icon.file-pdf { background: #b42318; }
        .article-file-icon.file-excel { background: #147a46; }
        .article-file-icon.file-word { background: #1f5fbf; }
        .article-file-icon.file-powerpoint { background: #b64a22; }
        .article-file-icon.file-archive { background: #6f4aa8; }

        .article-file-body {
            min-width: 0;
            flex: 1 1 auto;
        }

        .article-file-title {
            margin: 0 0 6px;
            font-size: 17px;
            line-height: 1.35;
            font-weight: 700;
            color: var(--site-text-color);
            overflow-wrap: anywhere;
        }

        .article-file-meta,
        .article-file-desc {
            margin: 0;
            color: var(--site-muted-color);
            font-size: 14px;
            line-height: 1.55;
            overflow-wrap: anywhere;
        }

        .article-file-actions {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .article-file-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 38px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--site-card-border);
            color: var(--site-text-color);
            background: var(--site-section-bg);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .article-file-btn:hover {
            color: var(--site-link-hover-color);
            background: var(--site-section-muted-bg);
            text-decoration: none;
        }

        .article-file-btn.primary {
            color: #fff;
            background: var(--site-link-color);
            border-color: var(--site-link-color);
        }

        .article-file-btn.primary:hover {
            color: #fff;
            background: var(--site-link-hover-color);
            border-color: var(--site-link-hover-color);
        }

        .article-files-summary {
            margin-top: 42px;
            padding-top: 24px;
            border-top: 1px solid var(--site-card-border);
        }

        .article-files-summary h2 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .article-files-summary .article-file-card {
            margin: 12px 0;
        }

        html[data-theme="dark"] .article-file-card {
            background: var(--site-card-bg);
            background: color-mix(in srgb, var(--site-card-bg) 94%, transparent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.34);
        }

        html[data-theme="dark"] .article-file-btn {
            background: var(--site-section-muted-bg);
        }

        html[data-theme="dark"] .article-file-btn:hover {
            background: color-mix(in srgb, var(--site-section-muted-bg) 78%, #ffffff 22%);
        }

        @media (max-width: 767px) {
            .article-file-card {
                align-items: flex-start;
                gap: 12px;
                padding: 14px;
            }

            .article-file-icon {
                flex-basis: 42px;
                width: 42px;
                height: 42px;
                font-size: 21px;
            }

            .article-file-actions {
                width: 100%;
                margin-top: 12px;
                grid-column: 1 / -1;
            }

            .article-file-card {
                display: grid;
                grid-template-columns: 42px minmax(0, 1fr);
            }

            .article-file-btn {
                flex: 1 1 0;
            }
        }

        /* 关闭按钮 */
        #toc-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        #toc-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 滚动条样式 */
        #toc-container::-webkit-scrollbar {
            width: 5px;
        }

        #toc-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #toc-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        #toc-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 适配文章内容，确保不被TOC遮挡 */
        @media (min-width: 1200px) {
            .container {
                padding-left: 100px;
            }
        }
    </style>
</head>

<!-- 动态加载 YAML 与 Markdown 的脚本 -->
<script>
  // 获取 URL 参数 ?a_id=...
  function getQueryParam(param) {
    return new URLSearchParams(window.location.search).get(param);
  }

  // 通用加载 YAML 的函数（返回解析后的对象）
  function loadYAML(path) {
    return fetch(path)
      .then(response => response.text())
      .then(yamlText => jsyaml.load(yamlText));
  }

  // 辅助函数：转义HTML特殊字符
  function escapeHtml(text) {
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  // 辅助函数：解码HTML实体
  function decodeHtmlEntities(text) {
    return text
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'")
      .replace(/&amp;/g, '&');
  }

  function escapeAttribute(value) {
    return escapeHtml(String(value || '')).replace(/`/g, '&#096;');
  }

  function getFileExtension(path) {
    const cleanPath = String(path || '').split('?')[0].split('#')[0];
    const match = cleanPath.match(/\.([a-z0-9]+)$/i);
    return match ? match[1].toLowerCase() : '';
  }

  function getArticleFileType(path) {
    const ext = getFileExtension(path);
    if (['xls', 'xlsx', 'xlsm', 'csv'].includes(ext)) {
      return { label: ext.toUpperCase() || 'Excel', icon: 'bi-file-earmark-excel', className: 'file-excel' };
    }
    if (['doc', 'docx'].includes(ext)) {
      return { label: ext.toUpperCase() || 'Word', icon: 'bi-file-earmark-word', className: 'file-word' };
    }
    if (ext === 'pdf') {
      return { label: 'PDF', icon: 'bi-file-earmark-pdf', className: 'file-pdf' };
    }
    if (['ppt', 'pptx'].includes(ext)) {
      return { label: ext.toUpperCase() || 'PPT', icon: 'bi-file-earmark-ppt', className: 'file-powerpoint' };
    }
    if (['zip', 'rar', '7z'].includes(ext)) {
      return { label: ext.toUpperCase() || 'Archive', icon: 'bi-file-earmark-zip', className: 'file-archive' };
    }
    return { label: ext ? ext.toUpperCase() : '文件', icon: 'bi-file-earmark', className: 'file-generic' };
  }

  function resolveArticleFileHref(rawHref, articleName) {
    const href = String(rawHref || '').trim().replace(/^file:/i, '');
    if (!href) return '';
    if (/^(https?:)?\/\//i.test(href) || href.startsWith('/') || href.startsWith('./') || href.startsWith('../')) {
      return href;
    }
    return `./blog-folder/${articleName}/${href}`;
  }

  function renderArticleFileCard(file, isSummary) {
    const fileType = getArticleFileType(file.href);
    const title = file.title || file.name || file.href.split('/').pop() || '关联文件';
    const descHtml = file.description ? `<p class="article-file-desc">${escapeHtml(file.description)}</p>` : '';
    const summaryClass = isSummary ? ' article-file-card-summary' : '';

    return `
      <div class="article-file-card${summaryClass}" data-file-href="${escapeAttribute(file.href)}">
        <div class="article-file-icon ${fileType.className}" aria-hidden="true">
          <i class="bi ${fileType.icon}"></i>
        </div>
        <div class="article-file-body">
          <p class="article-file-title">${escapeHtml(title)}</p>
          <p class="article-file-meta">${escapeHtml(fileType.label)} · ${escapeHtml(file.href)}</p>
          ${descHtml}
        </div>
        <div class="article-file-actions">
          <a class="article-file-btn" href="${escapeAttribute(file.href)}" target="_blank" rel="noopener">
            <i class="bi bi-box-arrow-up-right"></i> 打开
          </a>
          <a class="article-file-btn primary" href="${escapeAttribute(file.href)}" download>
            <i class="bi bi-download"></i> 下载
          </a>
        </div>
      </div>`;
  }

  function parseFilesCodeBlock(code, articleName, registerFile) {
    const rows = String(code || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean);
    const cards = rows.map(row => {
      const parts = row.split('|').map(part => part.trim());
      const href = resolveArticleFileHref(parts[0], articleName);
      const file = {
        href: href,
        title: parts[1] || '',
        description: parts.slice(2).join(' | ')
      };
      registerFile(file);
      return renderArticleFileCard(file, false);
    });
    return `<div class="article-files-inline">${cards.join('')}</div>`;
  }

  function appendArticleFileSummary(articleFiles) {
    if (!articleFiles.length) return;

    const articleContent = document.getElementById('article-md');
    const uniqueFiles = [];
    const seen = new Set();

    articleFiles.forEach(file => {
      if (!file.href || seen.has(file.href)) return;
      seen.add(file.href);
      uniqueFiles.push(file);
    });

    if (!uniqueFiles.length) return;

    const summaryHtml = `
      <section class="article-files-summary" id="article-files-summary">
        <h2><i class="bi bi-paperclip"></i> 关联文件</h2>
        ${uniqueFiles.map(file => renderArticleFileCard(file, true)).join('')}
      </section>`;
    articleContent.insertAdjacentHTML('beforeend', summaryHtml);
  }

  function enhanceMathOverflow() {
    const articleContent = document.getElementById('article-md');
    if (!articleContent) return;
    const articleWidth = articleContent.clientWidth || window.innerWidth;

    articleContent.querySelectorAll('mjx-container[jax="SVG"][display="true"]').forEach(container => {
      if (container.closest('.math-scroll-wrap')) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'math-scroll-wrap';
      container.parentNode.insertBefore(wrapper, container);
      wrapper.appendChild(container);
    });

    articleContent.querySelectorAll('mjx-container[jax="SVG"]:not([display="true"])').forEach(container => {
      if (container.closest('.math-inline-scroll')) return;

      const rect = container.getBoundingClientRect();
      if (rect.width <= articleWidth) return;

      const wrapper = document.createElement('span');
      wrapper.className = 'math-inline-scroll';
      container.parentNode.insertBefore(wrapper, container);
      wrapper.appendChild(container);
    });
  }

  // 确保 highlight.js 初始化
  document.addEventListener('DOMContentLoaded', function() {
      // 初始化 highlight.js
      hljs.configure({
          // 启用安全模式
          ignoreUnescapedHTML: true
      });

      // 如果页面上已有代码块，立即高亮
      document.querySelectorAll('pre code').forEach(block => {
          // 处理HTML内容
          if (block.className.includes('language-html') || block.className.includes('language-xml')) {
              // 将HTML实体转换回实际字符以便高亮
              block.innerHTML = block.innerHTML
                  .replace(/&lt;/g, '<')
                  .replace(/&gt;/g, '>')
                  .replace(/&quot;/g, '"')
                  .replace(/&#39;/g, "'")
                  .replace(/&amp;/g, '&');
          }

          try {
              hljs.highlightElement(block);
          } catch (e) {
              console.error('高亮处理错误:', e);
          }
      });
  });

  // 配置代码高亮
  function applyHighlight(html) {
    if (window.hljs) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;

      const codeBlocks = tempDiv.querySelectorAll('pre code');
      codeBlocks.forEach(block => {
        try {
          // 检查是否包含HTML内容
          if (block.getAttribute('data-contains-html') === 'true' ||
              block.className.includes('language-html') ||
              block.className.includes('language-xml')) {
            // 解码HTML实体以便正确高亮
            block.innerHTML = decodeHtmlEntities(block.innerHTML);
          }

          // 确保有语言类
          if (!block.className.includes('language-')) {
            block.className += ' language-plaintext';
          }

          // 应用高亮
          hljs.highlightElement(block);

          // 添加自定义类
          block.classList.add('pycharm-style');

          // 强制应用样式
          block.style.backgroundColor = '#2b2b2b';
          block.style.color = '#a9b7c6';

          // 如果是HTML内容，再次转义以防止执行
          if (block.getAttribute('data-contains-html') === 'true') {
            block.innerHTML = escapeHtml(block.innerHTML);
          }
        } catch (error) {
          console.error('高亮处理错误:', error);
        }
      });

      return tempDiv.innerHTML;
    }
    return html;
  }

  // 在文章加载完成后的处理
  function loadArticle(articleName) {
    // 根据实际存放位置调整路径
    const yamlPath = `./blog-folder/${articleName}.yml`;
    const mdPath = `./blog-folder/${articleName}.md`;
    const headingSlugCounts = new Map();
    const articleFiles = [];

    function registerArticleFile(file) {
      if (!file || !file.href) return;
      articleFiles.push(file);
    }

    // 自定义渲染器
    const renderer = new marked.Renderer();
      renderer.blockquote = function(quote) {
        return `<blockquote class="custom-blockquote">${quote}</blockquote>`;
      };

      // 修改标题渲染，添加ID以便章节导航
      renderer.heading = function(text, level) {
        const headingId = generateHeadingId(level, text);
        return `<h${level} id="${headingId}">${text}</h${level}>`;
      };

      renderer.paragraph = function(text) {
        if (String(text || '').includes('article-file-card')) {
          return `${text}\n`;
        }
        return `<p>${text}</p>\n`;
      };

      renderer.link = function(href, title, text) {
        const normalizedHref = String(href || '');
        if (normalizedHref.toLowerCase().startsWith('file:')) {
          const file = {
            href: resolveArticleFileHref(normalizedHref, articleName),
            title: getPlainTextFromHtml(text) || title || '',
            description: title || ''
          };
          registerArticleFile(file);
          return renderArticleFileCard(file, false);
        }

        const titleAttr = title ? ` title="${escapeAttribute(title)}"` : '';
        return `<a href="${escapeAttribute(normalizedHref)}"${titleAttr}>${text}</a>`;
      };

      marked.setOptions({
        headerIds: false,
        mangle: false,
        renderer: renderer,
        highlight: function(code, lang) {
          if (window.hljs) {
            return hljs.highlightAuto(code, lang ? [lang] : undefined).value;
          }
          return code;
        }
      });

      function getPlainTextFromHtml(value) {
        const parser = document.createElement('div');
        parser.innerHTML = String(value || '');
        return parser.textContent || parser.innerText || '';
      }

      function generateHeadingId(level, text) {
        const plainText = getPlainTextFromHtml(text).trim();
        const baseSlug = plainText
          .toLowerCase()
          .replace(/[^\p{L}\p{N}\s_-]/gu, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '')
          .slice(0, 80) || `heading-${level}`;
        const usedCount = (headingSlugCounts.get(baseSlug) || 0) + 1;
        headingSlugCounts.set(baseSlug, usedCount);
        return usedCount === 1 ? `toc-${baseSlug}` : `toc-${baseSlug}-${usedCount}`;
      }

    // 自定义代码块渲染，确保HTML被转义
    renderer.code = function(code, language) {
      // 处理不支持的语言
      if (language === 'commandline') {
        language = 'bash';
      } else if (language === 'files' || language === 'file') {
        return parseFilesCodeBlock(code, articleName, registerArticleFile);
      } else if (!language) {
        language = 'plaintext';
      }

      // 转义代码中的HTML
      const escapedCode = escapeHtml(code);

      // 返回带有语言类的代码块
      return `<pre><code class="language-${language}">${escapedCode}</code></pre>`;
    };

    loadYAML(yamlPath)
      .then(articleMeta => {
        // 遍历 YAML 中的每个键
        for (let key in articleMeta) {
          let elem = document.getElementById(key);
          if (elem) {
            if (key === "top-section") {
              elem.style.backgroundImage = `url('${articleMeta[key]}')`;
            } else {
              elem.innerText = articleMeta[key];
            }
          }
        }

        // 设置导航栏标题
        setTimeout(() => {
          const pageTitleElement = document.getElementById('page-top-title');
          if (pageTitleElement) {
            pageTitleElement.textContent = '博客';
          }
        }, 100);

        return fetch(mdPath);
      })
      .then(response => response.text())
      .then(mdText => {
        // 解析 Markdown
        const html = marked.parse(mdText);

        // 应用代码高亮
        const highlightedHtml = applyHighlight(html);

        // 更新 DOM
        document.getElementById('article-md').innerHTML = highlightedHtml;

        // 在文章末尾汇总所有通过 file 链接或 files 代码块声明的附件
        appendArticleFileSummary(articleFiles);

        // 重新渲染数学公式
        if (window.MathJax) {
          const mathJaxResult = MathJax.typesetPromise
            ? MathJax.typesetPromise([document.getElementById('article-md')])
            : Promise.resolve(MathJax.typeset());
          mathJaxResult.then(enhanceMathOverflow).catch(error => {
            console.error('数学公式渲染失败:', error);
            enhanceMathOverflow();
          });
        }

        // 添加：确保样式应用到所有代码块
        setTimeout(() => {
          document.querySelectorAll('#article-md pre code').forEach(block => {
            // 强制应用样式
            block.style.backgroundColor = '#2b2b2b';
            block.style.color = '#a9b7c6';

            // 查找并应用语法高亮颜色
            block.querySelectorAll('.hljs-keyword').forEach(el => { el.style.color = '#cc7832'; });
            block.querySelectorAll('.hljs-string').forEach(el => { el.style.color = '#6a8759'; });
            block.querySelectorAll('.hljs-comment').forEach(el => { el.style.color = '#808080'; });
            block.querySelectorAll('.hljs-number').forEach(el => { el.style.color = '#6897bb'; });
            block.querySelectorAll('.hljs-function').forEach(el => { el.style.color = '#ffc66d'; });
            block.querySelectorAll('.hljs-tag').forEach(el => { el.style.color = '#e8bf6a'; });
            block.querySelectorAll('.hljs-name').forEach(el => { el.style.color = '#e8bf6a'; });
            block.querySelectorAll('.hljs-attr').forEach(el => { el.style.color = '#9876aa'; });
            block.querySelectorAll('.hljs-built_in').forEach(el => { el.style.color = '#cc7832'; });
          });
        }, 100);

        // 生成章节导航
        generateTableOfContents();
      })
      .catch(error => console.error('加载文章失败:', error));
  }

  // 加载全局配置（例如 footer 的版权信息），假设 config.yml 存放在根目录
  function loadConfig() {
    const configPath = '/config.yml';
    loadYAML(configPath)
      .then(config => {
        if (config && config.footer && config.footer.copyright) {
          document.getElementById('copyright-text').innerHTML = config.footer.copyright;
        }
      })
      .catch(error => {
        console.error('加载全局配置失败:', error);
      });
  }

  let tocHeadings = [];
  let tocScrollTicking = false;
  let tocScrollListenerAttached = false;

  function scrollToHeading(heading) {
    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
    history.replaceState(null, '', `#${encodeURIComponent(heading.id)}`);
  }

  // 生成章节导航目录
  function generateTableOfContents() {
    const articleContent = document.getElementById('article-md');
    const tocContainer = document.getElementById('toc-container');
    const tocToggleBtn = document.getElementById('toc-toggle-btn');
    const tocList = document.getElementById('toc-list');
    tocHeadings = Array.from(articleContent.querySelectorAll('h1, h2, h3, h4, h5, h6'))
      .filter(heading => heading.textContent.trim());

    tocList.innerHTML = '';

    if (tocHeadings.length === 0) {
      tocContainer.classList.add('toc-empty');
      tocToggleBtn.classList.add('toc-empty');
      return;
    }

    tocContainer.classList.remove('toc-empty');
    tocToggleBtn.classList.remove('toc-empty');

    const minLevel = Math.min(...tocHeadings.map(heading => Number(heading.tagName.substring(1))));
    const tocFragment = document.createDocumentFragment();

    tocHeadings.forEach((heading, index) => {
      if (!heading.id) {
        heading.id = `heading-${index + 1}`;
      }

      const level = Number(heading.tagName.substring(1));
      const listItem = document.createElement('li');
      listItem.className = `toc-h${level}`;
      listItem.style.setProperty('--toc-depth', Math.max(0, level - minLevel));

      const link = document.createElement('a');
      link.href = `#${encodeURIComponent(heading.id)}`;
      link.textContent = heading.textContent.trim();
      link.title = heading.textContent.trim();
      link.addEventListener('click', function(e) {
        e.preventDefault();
        scrollToHeading(heading);

        if (window.innerWidth < 992) {
          tocContainer.classList.remove('show');
        }
      });

      listItem.appendChild(link);
      tocFragment.appendChild(listItem);
    });

    tocList.appendChild(tocFragment);
    updateTocDisplay();
    highlightCurrentSection();

    if (!tocScrollListenerAttached) {
      window.addEventListener('scroll', requestTocHighlight, { passive: true });
      tocScrollListenerAttached = true;
    }
  }

  function requestTocHighlight() {
    if (tocScrollTicking) return;
    tocScrollTicking = true;
    window.requestAnimationFrame(() => {
      highlightCurrentSection();
      tocScrollTicking = false;
    });
  }

  // 高亮当前可见的章节
  function highlightCurrentSection() {
    const tocItems = document.querySelectorAll('#toc-list li');
    const activationOffset = 120;
    let currentHeadingIndex = -1;

    tocHeadings.forEach((heading, index) => {
      if (heading.getBoundingClientRect().top <= activationOffset) {
        currentHeadingIndex = index;
      }
    });

    tocItems.forEach(item => item.classList.remove('active'));

    if (currentHeadingIndex >= 0 && currentHeadingIndex < tocItems.length) {
      const activeItem = tocItems[currentHeadingIndex];
      activeItem.classList.add('active');
      activeItem.scrollIntoView({ block: 'nearest' });
    }
  }

  function updateTocDisplay() {
    const tocContainer = document.getElementById('toc-container');
    const tocToggleBtn = document.getElementById('toc-toggle-btn');

    if (tocContainer.classList.contains('toc-empty')) {
      return;
    }

    if (window.innerWidth < 992) {
      tocContainer.classList.add('mobile');
      tocContainer.classList.remove('hidden');
      tocToggleBtn.style.display = 'flex';
      return;
    }

    tocContainer.classList.remove('mobile', 'show');
    tocToggleBtn.style.display = tocContainer.classList.contains('hidden') ? 'flex' : 'none';
  }

  // 设置移动端目录切换按钮事件
  document.getElementById('toc-toggle-btn').addEventListener('click', function() {
    const tocContainer = document.getElementById('toc-container');
    const tocToggleBtn = document.getElementById('toc-toggle-btn');

    if (window.innerWidth < 992) {
      tocContainer.classList.toggle('show');
    } else {
      tocContainer.classList.remove('hidden');
      tocToggleBtn.style.display = 'none';
    }
  });

  // 设置关闭按钮事件
  document.getElementById('toc-close').addEventListener('click', function() {
    const tocContainer = document.getElementById('toc-container');
    const tocToggleBtn = document.getElementById('toc-toggle-btn');

    if (window.innerWidth < 992) {
      tocContainer.classList.remove('show');
    } else {
      tocContainer.classList.add('hidden');
      tocToggleBtn.style.display = 'flex';
    }
  });

  // 添加窗口大小变化监听器，确保响应式布局正确
  window.addEventListener('resize', function() {
    updateTocDisplay();
    requestTocHighlight();
  });

  // 添加：防止导航栏滚动传递到页面
  document.getElementById('toc-container').addEventListener('wheel', function(event) {
    const container = this;
    const scrollTop = container.scrollTop;
    const scrollHeight = container.scrollHeight;
    const height = container.clientHeight;
    const delta = event.deltaY;

    // 检查是否已经滚动到底部或顶部
    const isAtTop = scrollTop <= 0;
    const isAtBottom = scrollHeight - scrollTop - height <= 1;

    // 如果向下滚动且已在底部，或向上滚动且已在顶部，则阻止事件传播
    if ((delta > 0 && isAtBottom) || (delta < 0 && isAtTop)) {
      event.preventDefault();
    }
  }, { passive: false });

  // 主程序：加载文章和全局配置
  const articleName = getQueryParam('a_id');
  if (articleName) {
    loadArticle(articleName);
  } else {
    document.getElementById('article-md').innerHTML = '<p>没有指定文章</p>';
  }
  loadConfig();
</script>
