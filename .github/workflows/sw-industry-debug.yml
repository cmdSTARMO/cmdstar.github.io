name: SW Industry Debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-sw-industry:
    name: Debug SW industry fetcher
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/base_data_renew_folder/automations
      PYTHONUNBUFFERED: "1"
      SW_INDUSTRY_DAILY_DEBUG_HTTP: "1"
      SW_INDUSTRY_DAILY_RETRY_SLEEP: "5"
      SW_INDUSTRY_DAILY_RETRIES: "2"
      SW_INDUSTRY_DAILY_CONNECT_TIMEOUT: "12"
      SW_INDUSTRY_DAILY_READ_TIMEOUT: "120"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow urllib3

      - name: Run SW industry fetcher with HTTP debug logs
        run: |
          python base_data_renew_folder/automations/sw_industry_daily_fetcher.py
